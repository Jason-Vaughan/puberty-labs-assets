name: collect-stats

on:
  schedule:
    # Hourly. Each run is ~60s of CI on a public repo (free GitHub Actions
    # minutes). The "Commit updated stats" step uses `-I` to ignore changes
    # that are only timestamp churn (updatedAt / runStartedAt / runFinishedAt),
    # so 23/24 runs/day produce zero-noise no-ops when no project actually
    # changed. After a real push, the next hourly run picks it up — or trigger
    # manually via workflow_dispatch for instant refresh.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-stats
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runtime deps
        run: npm i js-yaml --no-save --no-audit --no-fund

      - name: Run collector
        env:
          STATS_COLLECTOR_TOKEN: ${{ secrets.STATS_COLLECTOR_TOKEN }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
        run: node scripts/collect-stats.mjs

      - name: Commit updated stats
        # Skip the commit when the only changes are timestamp churn — every
        # run rewrites updatedAt / runStartedAt / runFinishedAt regardless of
        # whether real values changed. `git diff -I<regex>` ignores hunks where
        # all changed lines match the regex, so timestamp-only diffs become
        # silent no-ops at hourly cadence (23/24 runs/day).
        run: |
          git config user.name  "stats-bot"
          git config user.email "stats-bot@users.noreply.github.com"
          git add '*-stats.json' _collect-meta.json
          if git diff --cached \
              -I '"updatedAt":' \
              -I '"runStartedAt":' \
              -I '"runFinishedAt":' \
              --quiet; then
            echo "No meaningful stats changes (timestamps only or no diff)."
          else
            git commit -m "chore(stats): refresh $(date -u +%FT%TZ)"
            git push
          fi
